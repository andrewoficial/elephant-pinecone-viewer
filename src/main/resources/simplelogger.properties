# Default log level for all loggers (trace, debug, info, warn, error)
org.slf4j.simpleLogger.defaultLogLevel=info

# Write logs to System.out instead of System.err (fixes red text in IDEA)
org.slf4j.simpleLogger.logFile=System.out

# Enable ANSI colors for different log levels (WARN = yellow, ERROR = red, etc.)
org.slf4j.simpleLogger.colorEnabled=true

# Date and time formatting
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=HH:mm:ss.SSS
org.slf4j.simpleLogger.showThreadName=false
org.slf4j.simpleLogger.showLogName=false
org.slf4j.simpleLogger.showShortLogName=false

# Level in brackets (false = use color coding instead of brackets)
org.slf4j.simpleLogger.levelInBrackets=true

# Optional: reduce noise from external libraries
# org.slf4j.simpleLogger.log.io.grpc=warn
# org.slf4j.simpleLogger.log.io.netty=warn